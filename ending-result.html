<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>엔딩 | 이세계 탐정 : 팬미팅 살인사건</title>
    <meta
      name="description"
      content="이세계 탐정 : 팬미팅 살인사건 엔딩"
    />
    <link rel="stylesheet" href="./styles.css?v=11" />
  </head>
  <body class="ending-page">
    <header class="topbar">
      <a class="back-link" href="./ending-answer.html" aria-label="정답 체크로 돌아가기">←</a>
      <h1>엔딩</h1>
    </header>

    <main class="ending-shell">
      <section class="ending-panel">
        <p class="eyebrow">ENDING</p>
        <h2>엔딩</h2>

        <p class="center-text">
          모든 플레이어의 선택과 행동 결과에 따라<br />
          엔딩이 달라집니다. 아래 [엔딩 판정] 을 진행하면,<br />
          여러분의 선택에 따른 엔딩을 감상할 수 있습니다.
        </p>

        <h3 class="ending-subtitle">엔딩 판정</h3>

        <p class="center-text">
          ※ 아래 체크리스트를 순서대로 진행해 주세요.
        </p>

        <p class="check-title">[엔딩A - 모든 진실] 판정 체크리스트</p>

        <form class="check-list">
          <label>
            <input type="checkbox" />
            <span>현기수가 안지유를 협박한 사실이 폭로됐나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>현기수가 구속됐나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>김영탁이 살해를 지시했다는 사실이 폭로됐나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>박주은이 B루트를 선택하고, 투표 단계 때 진범을 지목했나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>심진규가 [특별 단서 - 냐콩 B] 를 소지하고 있나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>아무도 ‘차 키’ 를 사용해 다른 사람을 살해하지 않았나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>주세화가 자신이 냐콩이 아니라는 사실을 자백했나요?</span>
          </label>
          <label>
            <input type="checkbox" />
            <span>이세계 탐정이 악마에게 영혼을 먹히지 않았나요?</span>
          </label>
        </form>

        <div class="ending-note">
          <p>☞ 전부 체크된다면, [엔딩 A - 모든 진실] 버튼을 눌러주세요.</p>
          <p>☞ 하나라도 체크되지 않는다면, [엔딩 B - 최악의 결말 판정] 버튼을 눌러 체크리스트를 확인해 주세요.</p>
        </div>

        <div class="ending-actions">
          <a class="ending-action" href="./ending-a.html">엔딩 A - 모든 진실</a>
          <a class="ending-action secondary" href="./ending-b-check.html">엔딩 B - 최악의 결말 판정</a>
        </div>
      </section>
    </main>
  </body>
</html>
