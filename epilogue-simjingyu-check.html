<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>심진규 에필로그 판정 | 이세계 탐정 : 팬미팅 살인사건</title>
    <link rel="stylesheet" href="./styles.css?v=24" />
  </head>
  <body class="ending-page">
    <header class="topbar">
      <a class="back-link" href="./epilogue-jusehwa-check.html" aria-label="주세화 판정으로 돌아가기">←</a>
      <h1>심진규 판정</h1>
    </header>

    <main class="ending-shell">
      <section class="ending-panel">
        <p class="eyebrow">SIMJINGYU EPILOGUE</p>
        <h2>심진규 에필로그 판정</h2>

        <p class="center-text">
          심진규는, 목표 A와 목표 B 중<br />
          뭘 선택했느냐에 따라 에필로그가 달라집니다.
        </p>

        <section class="epilogue-check-section">
          <h3>심진규 목표 A 선택시 체크 - [에필로그 A판정]</h3>
          <form class="check-list">
            <label>
              <input type="checkbox" />
              <span>현기수의 의뢰를 완수했나요?</span>
            </label>
            <label>
              <input type="checkbox" />
              <span>현기수가 구속되거나, 사망하지 않았나요?</span>
            </label>
          </form>
          <p>※ 모두 체크됐다면, [심진규 에필로그 A] 로 가주세요.</p>
        </section>

        <section class="epilogue-check-section">
          <h3>심진규 목표 B 선택시 체크 - [에필로그 B판정]</h3>
          <form class="check-list">
            <label>
              <input type="checkbox" />
              <span>현기수가 구속됐나요?</span>
            </label>
            <label>
              <input type="checkbox" />
              <span>음성변조프로그램을 소지했나요?</span>
            </label>
          </form>
          <p>※ 모두 체크됐다면, [심진규 에필로그 B] 로 가주세요.</p>
        </section>

        <div class="ending-actions">
          <a class="ending-action" href="./epilogue-simjingyu-a.html">심진규 에필로그 A</a>
          <a class="ending-action secondary" href="./epilogue-simjingyu-b.html">심진규 에필로그 B</a>
        </div>

        <p class="story-notice epilogue-skip-notice">
          ※ 만약 심진규의 에필로그가 존재하지 않는 경우, 아래 버튼을 눌러주세요.
        </p>

        <a class="ending-action epilogue-next-button" href="./epilogue-parkjueun-check.html">박주은 에필로그 판정 진행</a>
      </section>
    </main>
  </body>
</html>
